<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<title>Purchase Savings Calculator</title>
	<defs>
		<style type="text/css"><![CDATA[
			@font-face {
				font-family: 'Noto Sans Devanagari';
				font-style: normal;
				font-weight: 700;
				font-display: swap;
				src: url(https://fonts.gstatic.com/s/notosansdevanagari/v30/TuGoUUFzXI5FBtUq5a8bjKYTZjtRU6Sgv3NaV_SNmI0b8QQCQmHn6B2OHjbL_08AlZMiy-A.ttf) format('truetype');
			}
			.ra {
				font-family: 'Noto Sans Devanagari', sans-serif;
				font-weight: 700;
				font-size: 82px;
			}
		]]></style>
		<radialGradient id="lm-bg" cx="64" cy="64" r="62" gradientUnits="userSpaceOnUse">
			<stop offset="0%" stop-color="#f0fdfa" />
			<stop offset="45%" stop-color="#ecfeff" />
			<stop offset="100%" stop-color="#e0e7ff" />
		</radialGradient>
		<linearGradient id="lm-ra" x1="36" y1="28" x2="92" y2="100" gradientUnits="userSpaceOnUse">
			<stop offset="0%" stop-color="#0d9488" />
			<stop offset="45%" stop-color="#14b8a6" />
			<stop offset="100%" stop-color="#4f46e5" />
		</linearGradient>
		<linearGradient id="lm-strike" x1="20" y1="58" x2="108" y2="58" gradientUnits="userSpaceOnUse">
			<stop offset="0%" stop-color="#b45309" />
			<stop offset="50%" stop-color="#f59e0b" />
			<stop offset="100%" stop-color="#fbbf24" />
		</linearGradient>
		<linearGradient id="lm-ring" x1="16" y1="16" x2="112" y2="112" gradientUnits="userSpaceOnUse">
			<stop offset="0%" stop-color="#0d9488" stop-opacity="0.5" />
			<stop offset="100%" stop-color="#4f46e5" stop-opacity="0.4" />
		</linearGradient>
		<filter id="lm-glow" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0d9488" flood-opacity="0.35" />
