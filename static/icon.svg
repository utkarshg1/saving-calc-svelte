	<circle cx="64" cy="64" r="62" fill="url(#lm-bg)" />
	<circle cx="64" cy="64" r="58" stroke="url(#lm-ring)" stroke-width="1.5" opacity="0.35" />
	<circle cx="64" cy="64" r="54" stroke="url(#lm-ring)" stroke-width="2" stroke-dasharray="8 6" opacity="0.45" />
	<path d="M 16 104 A 76 76 0 0 1 108 28" stroke="#14b8a6" stroke-width="2.5" stroke-linecap="round" opacity="0.25" />
	<line x1="18" y1="58" x2="110" y2="58" stroke="url(#lm-strike)" stroke-width="4.5" stroke-linecap="round" opacity="0.92" />
	<text class="ra" x="64" y="84" text-anchor="middle" fill="url(#lm-ra)" filter="url(#lm-glow)">र</text>
